<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Player Pro</title>

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    h2 {
      margin: 10px 0 5px;
    }

    p {
      color: #aaa;
      margin: 0;
    }

    .controls button {
      margin: 10px;
      padding: 10px;
      border: none;
      border-radius: 50%;
      background: #1db954;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .controls button:hover {
      background: #17a74a;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
      text-align: left;
    }

    li {
      padding: 5px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }

    li:hover {
      color: #1db954;
    }
  </style>
</head>

<body>

<div class="player">
  <img id="capa" src="capa1.jpg">
  <h2 id="titulo">Música 1</h2>
  <p id="artista">Artista</p>

  <audio id="audio"></audio>

  <div class="controls">
    <button onclick="anterior()">⏮</button>
    <button onclick="playPause()">▶</button>
    <button onclick="proxima()">⏭</button>
  </div>

  <ul id="lista"></ul>
</div>

<script>
    const musicas = [
  { titulo: "Amar Não é Pecado", artista: "Luan Santana", arquivo: "amar.mp3", capa: "luan.png" },
  { titulo: "Meteoro", artista: "Luan Santana", arquivo: "meteoro.mp3", capa: "luan.png" },
  { titulo: "2050", artista: "Luan Santana", arquivo: "2050.mp3", capa: "luan.png" },
  { titulo: "Acordando o Prédio", artista: "Luan Santana", arquivo: "predio.mp3", capa: "luan.png" },
  { titulo: "Adrenalina", artista: "Luan Santana", arquivo: "adrenalina.mp3", capa: "luan.png" },
  { titulo: "As Lembranças Vão na Mala", artista: "Luan Santana", arquivo: "lembrancas.mp3", capa: "luan.png" },
  { titulo: "Café com Leite", artista: "Luan Santana", arquivo: "cafe.mp3", capa: "luan.png" },
  { titulo: "Chuva de Arroz", artista: "Luan Santana", arquivo: "chuva.mp3", capa: "luan.png" },
  { titulo: "Cê Topa", artista: "Luan Santana", arquivo: "cetopa.mp3", capa: "luan.png" },
  { titulo: "Dia, Lugar e Hora", artista: "Luan Santana", arquivo: "dia.mp3", capa: "luan.png" },
  { titulo: "Escreve Aí", artista: "Luan Santana", arquivo: "escreveai.mp3", capa: "luan.png" },
  { titulo: "Eu Não Merecia Isso", artista: "Luan Santana", arquivo: "merecia.mp3", capa: "luan.png" },
  { titulo: "Garotas Inocentes", artista: "Luan Santana", arquivo: "garotas.mp3", capa: "luan.png" },
  { titulo: "Morena", artista: "Luan Santana", arquivo: "morena.mp3", capa: "luan.png" },
  { titulo: "Mesmo Sem Estar (ft. Sandy)", artista: "Luan Santana", arquivo: "mesmo.mp3", capa: "luan.png" },
  { titulo: "Nosso Tempo é Hoje", artista: "Luan Santana", arquivo: "tempo.mp3", capa: "luan.png" },
  { titulo: "Não Era Pra Ser Eu", artista: "Luan Santana", arquivo: "naoera.mp3", capa: "luan.png" },
  { titulo: "Química do Amor", artista: "Luan Santana", arquivo: "quimica.mp3", capa: "luan.png" },
  { titulo: "Sinais", artista: "Luan Santana", arquivo: "sinais.mp3", capa: "luan.png" },
  { titulo: "Sogrão Caprichou", artista: "Luan Santana", arquivo: "sograo.mp3", capa: "luan.png" },
  { titulo: "Tanto Faz", artista: "Luan Santana", arquivo: "tantofaz.mp3", capa: "luan.png" },
  { titulo: "Te Vivo", artista: "Luan Santana", arquivo: "tevivo.mp3", capa: "luan.png" },
  { titulo: "Te Esperando", artista: "Luan Santana", arquivo: "teesperando.mp3", capa: "luan.png" },
  { titulo: "Tudo Que Você Quiser", artista: "Luan Santana", arquivo: "tudo.mp3", capa: "luan.png" },
  { titulo: "Um Beijo", artista: "Luan Santana", arquivo: "umbeijo.mp3", capa: "luan.png" },
  { titulo: "Choque Térmico", artista: "Luan Santana", arquivo: "choque.mp3", capa: "luan.png" },
  { titulo: "Quando a Bad Bater", artista: "Luan Santana", arquivo: "bad.mp3", capa: "luan.png" },
  { titulo: "Sofrendo Feito Louco", artista: "Luan Santana", arquivo: "sofrendo.mp3", capa: "luan.png" },
  { titulo: "Vingança", artista: "Luan Santana", arquivo: "vinganca.mp3", capa: "luan.png" },
  { titulo: "Água com Açúcar", artista: "Luan Santana", arquivo: "agua.mp3", capa: "luan.png" },
  { titulo: "Menina", artista: "Luan Santana", arquivo: "menina.mp3", capa: "luan.png" },
  { titulo: "Eu, Você, o Mar e Ela", artista: "Luan Santana", arquivo: "mar.mp3", capa: "luan.png" },
  { titulo: "Um Beijo", artista: "Luan Santana", arquivo: "umbeijo.mp3", capa: "luan.png" },
  { titulo: "Quando a Bad Bater", artista: "Luan Santana", arquivo: "bad.mp3", capa: "luan.png" },
  { titulo: "Te Vivo", artista: "Luan Santana", arquivo: "tevivo.mp3", capa: "luan.png" },
];

  let index = 0;
  const audio = document.getElementById("audio");

  function carregarMusica(i) {
    index = i;
    audio.src = musicas[i].arquivo;
    document.getElementById("titulo").innerText = musicas[i].titulo;
    document.getElementById("artista").innerText = musicas[i].artista;
    document.getElementById("capa").src = musicas[i].capa;
    audio.play();
  }

  function playPause() {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  }

  function proxima() {
    index = (index + 1) % musicas.length;
    carregarMusica(index);
  }

  function anterior() {
    index = (index - 1 + musicas.length) % musicas.length;
    carregarMusica(index);
  }

  audio.addEventListener("ended", proxima);

  const lista = document.getElementById("lista");

  musicas.forEach((m, i) => {
    const li = document.createElement("li");
    li.innerText = m.titulo;
    li.onclick = () => carregarMusica(i);
    lista.appendChild(li);
  });

  carregarMusica(0);
</script>

</body>
</html>
